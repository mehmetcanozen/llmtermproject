[pytest]
testpaths = tests
norecursedirs =
    .git
    .pytest_cache
    .pytest_tmp
    __pycache__
    pytest-cache-files-*
    artifacts
    external
    outputs
    Docs
    Plans
    Progress
addopts = -q -p no:cacheprovider --basetemp=.pytest_tmp
tmp_path_retention_policy = none
tmp_path_retention_count = 0
